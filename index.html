<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minuit Studio — Coming Soon</title>
    <meta name="description" content="Minuit Studio — Coming soon." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <link rel="preload" as="image" href="assets/background_image-900.jpg" media="(max-width: 900px)" fetchpriority="high">
    <link rel="preload" as="image" href="assets/background_image-1672.jpg" media="(min-width: 901px)" fetchpriority="high">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Pacifico&display=swap"
        rel="stylesheet">

    <style>
        :root {
            color-scheme: dark;
            --bg: #000;
            --fg: rgba(255, 255, 255, 0.98);
            --muted: rgba(255, 255, 255, 0.68);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: #000;
            background-image: url("assets/background_image-1672.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--fg);
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .wrap {
            width: min(1100px, 94vw);
            text-align: center;
            padding: 7vh 0;
        }

        /* Typewriter */
        .type {
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            width: 0px;
            border-right: 2px solid rgba(255, 255, 255, 0.9);
            padding-right: 6px;
            will-change: width;
        }

        .caret {
            animation: caretBlink 900ms steps(1, end) infinite;
        }

        @keyframes caretBlink {
            50% {
                border-right-color: transparent;
            }
        }

        .wordmark {
            /* Approche "Hello" Apple:
               - sur macOS: polices script Apple si disponibles
               - ailleurs: fallback web proche (Pacifico) */
            font-family:
                "Hello Script",
                "Snell Roundhand",
                "Zapfino",
                "Apple Chancery",
                "Brush Script MT",
                "Pacifico",
                cursive;
            font-size: clamp(46px, 8.4vw, 124px);
            letter-spacing: 0.01em;
            line-height: 1.06;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 1),
                    rgba(255, 255, 255, 0.72));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.45));
        }

        .wordmarkOutline {
            text-shadow:
                0 0 28px rgba(255, 255, 255, 0.10),
                0 0 2px rgba(255, 255, 255, 0.20);
        }

        .sub {
            margin-top: clamp(18px, 3.2vw, 28px);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
            font-weight: 500;
            font-size: 13px;
            line-height: 1.4;
            color: var(--muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            transform-origin: center;
            animation: subtlePulse 2.9s ease-in-out infinite;
            filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
            will-change: opacity, transform, filter;
        }

        @keyframes subtlePulse {

            0%,
            100% {
                opacity: 0.92;
                transform: translateZ(0) scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.10));
            }

            40% {
                opacity: 0.05;
                transform: translateZ(0) scale(0.985);
                filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
            }

            55% {
                opacity: 0.35;
                transform: translateZ(0) scale(0.995);
                filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.06));
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .type {
                width: auto !important;
                border-right-color: transparent;
            }
        }

        @media (max-width: 900px) {
            body {
                background-image: url("assets/background_image-900.jpg");
            }
        }
    </style>
</head>

<body>
    <main class="wrap" aria-label="Minuit Studio — Coming soon">
        <div id="type" class="type caret" data-text="Minuit Studio" aria-label="Minuit Studio">
            <span class="wordmark wordmarkOutline">Minuit Studio</span>
        </div>

        <div class="sub">Coming soon</div>
    </main>

    <script>
        (() => {
            const el = document.getElementById("type");
            if (!el) return;

            const reduceMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;
            if (reduceMotion) return;

            const text = el.getAttribute("data-text") || el.textContent || "";
            const chars = Math.max(1, [...text].length);

            // Mesure la largeur finale puis anime en "steps" façon frappe clavier.
            el.style.width = "auto";
            const targetWidth = Math.ceil(el.scrollWidth);
            el.style.width = "0px";

            el.animate(
                [
                    { width: "0px" },
                    { width: `${targetWidth}px` }
                ],
                {
                    duration: 1500,
                    delay: 250,
                    easing: `steps(${chars}, end)`,
                    fill: "forwards"
                }
            );
        })();
    </script>
</body>

</html>
