<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minuit Studio — Coming Soon</title>
    <meta name="description" content="Minuit Studio — Coming soon." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <link rel="preload" as="image" href="assets/background_image-900.jpg" fetchpriority="high">
    <link rel="preload" as="image" href="assets/background_image-1672.jpg" media="(min-width: 901px)"
        fetchpriority="high">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Pacifico&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: dark;
            --bg: #000;
            --fg: rgba(255, 255, 255, 0.98);
            --muted: rgba(255, 255, 255, 0.68);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100svh;
            background-color: #000;
            /* Mobile-first: évite les soucis de media queries sur certains devices */
            background-image: url("assets/background_image-900.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--fg);
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        @media (min-width: 901px) {
            body {
                background-image: url("assets/background_image-1672.jpg");
            }
        }

        .wrap {
            width: min(1100px, 94vw);
            text-align: center;
            padding: 7vh 0;
        }

        .bottomMeta {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 32px;
            padding: 0 16px;
            text-align: center;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.92);
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
        }

        .bottomMeta .sep {
            color: rgba(255, 255, 255, 0.42);
        }

        /* Typewriter */
        .type {
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            width: 0px;
            border-right: 2px solid rgba(255, 255, 255, 0.9);
            padding-right: 6px;
            will-change: width;
            user-select: text;
        }

        .caret {
            animation: caretBlink 900ms steps(1, end) infinite;
        }

        @keyframes caretBlink {
            50% {
                border-right-color: transparent;
            }
        }

        .wordmark {
            /* Approche "Hello" Apple:
               - sur macOS: polices script Apple si disponibles
               - ailleurs: fallback web proche (Pacifico) */
            font-family:
                "Hello Script",
                "Snell Roundhand",
                "Zapfino",
                "Apple Chancery",
                "Brush Script MT",
                "Pacifico",
                cursive;
            font-size: clamp(46px, 8.4vw, 124px);
            letter-spacing: 0.01em;
            line-height: 1.06;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 1),
                    rgba(255, 255, 255, 0.72));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.45));
        }

        .wordmarkOutline {
            text-shadow:
                0 0 28px rgba(255, 255, 255, 0.10),
                0 0 2px rgba(255, 255, 255, 0.20);
        }

        .sub {
            margin-top: clamp(18px, 3.2vw, 28px);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
            font-weight: 500;
            font-size: 13px;
            line-height: 1.4;
            color: var(--muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            transform-origin: center;
            animation: subtlePulse 2.9s ease-in-out infinite;
            filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
            will-change: opacity, transform, filter;
            user-select: none;
        }

        @keyframes subtlePulse {

            0%,
            100% {
                opacity: 0.92;
                transform: translateZ(0) scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.10));
            }

            40% {
                opacity: 0.05;
                transform: translateZ(0) scale(0.985);
                filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
            }

            55% {
                opacity: 0.35;
                transform: translateZ(0) scale(0.995);
                filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.06));
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .type {
                width: auto !important;
                border-right-color: transparent;
            }
        }

        /* High-DPI: autorise une image plus nette si besoin */
        @media (max-width: 900px) and (min-resolution: 2dppx) {
            body {
                background-image: url("assets/background_image-1672.jpg");
            }
        }

        /* macOS-like selection menu (dark glass, squircle corners) */
        .ms-selectMenu {
            position: fixed;
            z-index: 9999;
            display: none;
            min-width: 260px;
            padding: 8px;
            color: rgba(255, 255, 255, 0.92);
            background: rgba(0, 0, 0, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow:
                0 18px 60px rgba(0, 0, 0, 0.65),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px) saturate(150%);
            -webkit-backdrop-filter: blur(18px) saturate(150%);
            /* "Squircle" approximation without clipping content */
            border-radius: 22px;
            transform: translate3d(0, 0, 0);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial;
            letter-spacing: 0.01em;
            visibility: hidden;
        }

        .ms-selectMenu[data-open="true"] {
            display: block;
            animation: msMenuIn 120ms ease-out both;
        }

        @keyframes msMenuIn {
            from {
                opacity: 0;
                transform: translate3d(0, 8px, 0) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }
        }

        .ms-selectMenuList {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .ms-selectMenuItem {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 14px;
            text-decoration: none;
            color: inherit;
            outline: none;
        }

        .ms-selectMenuItem:hover,
        .ms-selectMenuItem:focus-visible {
            background: rgba(255, 255, 255, 0.08);
        }

        .ms-selectMenuIcon {
            width: 18px;
            height: 18px;
            flex: 0 0 18px;
            opacity: 0.92;
        }

        .ms-selectMenuText {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            min-width: 0;
        }

        .ms-selectMenuPrimary {
            font-size: 13px;
            font-weight: 550;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ms-selectMenuSecondary {
            font-size: 11px;
            line-height: 1.1;
            color: rgba(255, 255, 255, 0.64);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>
    <main class="wrap" aria-label="Minuit Studio — Coming soon">
        <div id="type" class="type caret" data-text="Minuit Studio" aria-label="Minuit Studio">
            <span class="wordmark wordmarkOutline">Minuit Studio</span>
        </div>

        <div class="sub">Coming soon</div>
    </main>

    <div class="bottomMeta" aria-hidden="true">
        UI/UX Design <span class="sep">/</span> Dev Full‑Stack <span class="sep">/</span> SaaS &amp; Apps Web
    </div>

    <nav id="msSelectMenu" class="ms-selectMenu" role="menu" aria-label="Actions Minuit Studio">
        <ul class="ms-selectMenuList" role="presentation">
            <li role="none">
                <a class="ms-selectMenuItem" role="menuitem" href="mailto:hello@minuit.studio">
                    <svg class="ms-selectMenuIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path fill="currentColor"
                            d="M4.75 6.5h14.5c.966 0 1.75.784 1.75 1.75v7.5c0 .966-.784 1.75-1.75 1.75H4.75A1.75 1.75 0 0 1 3 15.75v-7.5C3 7.284 3.784 6.5 4.75 6.5Zm.39 1.5 6.44 5.02a.75.75 0 0 0 .92 0l6.44-5.02H5.14Z" />
                    </svg>
                    <span class="ms-selectMenuText">
                        <span class="ms-selectMenuPrimary">Contactez-nous</span>
                        <span class="ms-selectMenuSecondary">hello@minuit.studio</span>
                    </span>
                </a>
            </li>
            <li role="none">
                <a class="ms-selectMenuItem" role="menuitem" href="https://facebook.com/hello.minuitstudio"
                    target="_blank" rel="noopener noreferrer">
                    <svg class="ms-selectMenuIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path fill="currentColor"
                            d="M13.5 21v-7h2.35l.35-2.75H13.5V9.5c0-.8.22-1.35 1.37-1.35h1.46V5.7a19.8 19.8 0 0 0-2.13-.11c-2.1 0-3.55 1.28-3.55 3.64v2.02H8.3V14h2.35v7h2.85Z" />
                    </svg>
                    <span class="ms-selectMenuText">
                        <span class="ms-selectMenuPrimary">Rejoignez-nous sur FB</span>
                        <span class="ms-selectMenuSecondary">facebook.com/hello.minuitstudio</span>
                    </span>
                </a>
            </li>
        </ul>
    </nav>

    <script>
        (() => {
            const el = document.getElementById("type");
            if (!el) return;

            const reduceMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;
            if (reduceMotion) return;

            const text = el.getAttribute("data-text") || el.textContent || "";
            const chars = Math.max(1, [...text].length);

            // Mesure la largeur finale puis anime en "steps" façon frappe clavier.
            el.style.width = "auto";
            const targetWidth = Math.ceil(el.scrollWidth);
            el.style.width = "0px";

            el.animate(
                [
                    { width: "0px" },
                    { width: `${targetWidth}px` }
                ],
                {
                    duration: 1500,
                    delay: 250,
                    easing: `steps(${chars}, end)`,
                    fill: "forwards"
                }
            );
        })();
    </script>

    <script>
        (() => {
            const titleHost = document.getElementById("type");
            const menu = document.getElementById("msSelectMenu");
            if (!titleHost || !menu) return;

            const TITLE = "Minuit Studio";
            const PADDING = 10;

            const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

            function closeMenu() {
                menu.dataset.open = "false";
                menu.style.left = "";
                menu.style.top = "";
                menu.style.visibility = "hidden";
            }

            function getSelectionInTitle() {
                const sel = window.getSelection?.();
                if (!sel || sel.rangeCount === 0) return null;
                if (sel.isCollapsed) return null;

                const range = sel.getRangeAt(0);
                const common = range.commonAncestorContainer;
                const containerEl = common.nodeType === Node.ELEMENT_NODE ? common : common.parentElement;
                if (!containerEl) return null;
                if (!titleHost.contains(containerEl)) return null;

                const text = (sel.toString?.() || "").replace(/\s+/g, " ").trim();
                if (!text) return null;

                const normalizedTitle = TITLE.replace(/\s+/g, " ").trim();
                if (!normalizedTitle.toLowerCase().includes(text.toLowerCase())) return null;

                const rect = range.getBoundingClientRect();
                if (!rect || (rect.width === 0 && rect.height === 0)) return null;
                return { rect };
            }

            function openMenuNearRect(rect) {
                menu.dataset.open = "true";

                const menuRect = menu.getBoundingClientRect();
                const vw = window.innerWidth;
                const vh = window.innerHeight;

                const left = clamp(rect.left, PADDING, vw - menuRect.width - PADDING);
                const top = clamp(rect.bottom + 10, PADDING, vh - menuRect.height - PADDING);

                menu.style.left = `${Math.round(left)}px`;
                menu.style.top = `${Math.round(top)}px`;
                menu.style.visibility = "visible";
            }

            function maybeShowMenu() {
                const hit = getSelectionInTitle();
                if (!hit) {
                    closeMenu();
                    return;
                }
                openMenuNearRect(hit.rect);
            }

            document.addEventListener("mouseup", () => window.requestAnimationFrame(maybeShowMenu), { passive: true });
            document.addEventListener("keyup", (e) => {
                if (e.key === "Escape") closeMenu();
                window.requestAnimationFrame(maybeShowMenu);
            });

            document.addEventListener("contextmenu", (e) => {
                const hit = getSelectionInTitle();
                if (!hit) return;
                e.preventDefault();
                openMenuNearRect(hit.rect);
            });

            document.addEventListener("pointerdown", (e) => {
                if (menu.dataset.open !== "true") return;
                const t = e.target;
                if (t instanceof Node && menu.contains(t)) return;
                closeMenu();
            }, { capture: true });

            window.addEventListener("scroll", closeMenu, { passive: true });
            window.addEventListener("resize", closeMenu, { passive: true });
            window.addEventListener("blur", closeMenu);
        })();
    </script>
</body>

</html>
